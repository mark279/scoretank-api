name: ScoreTank Live Scraper

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: جلب الملفات
      uses: actions/checkout@v4

    - name: تجهيز بيئة Node.js الحديثة مباشرة
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: تسطيب المكتبات
      run: npm install

    - name: تشغيل محرك السحب
      run: npm start

    - name: حفظ وتحديث ملف api.json
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "ScoreTank Bot"
        git add api.json
        git commit -m "تحديث المباريات اللحظية [skip ci]" || echo "لا توجد تحديثات"
        git pull --rebase --autostash
        git push
